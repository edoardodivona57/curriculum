<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edoardo Di Vona — Curriculum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0e12;
    --bg-panel: #10151b;
    --amber: #ffb000;
    --cyan: #34d3c4;
    --ink: #e7ecef;
    --ink-dim: #6b7784;
    --line: #1e2731;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 20% -10%, rgba(255,176,0,0.06), transparent 40%),
      radial-gradient(circle at 80% 110%, rgba(52,211,196,0.06), transparent 40%),
      var(--bg);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 18px;
  }
  .card{
    width:100%;
    max-width:520px;
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:0.72rem;
    letter-spacing:0.18em;
    color:var(--amber);
    text-transform:uppercase;
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:18px;
  }
  .eyebrow::before{
    content:"";
    width:7px;height:7px;
    background:var(--amber);
    border-radius:50%;
    box-shadow:0 0 8px var(--amber);
    animation:blink 1.8s ease-in-out infinite;
  }
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.25;}}

  h1{
    font-family:'JetBrains Mono', monospace;
    font-weight:800;
    font-size:1.7rem;
    line-height:1.25;
    margin:0 0 6px;
    letter-spacing:-0.01em;
  }
  h1 span{color:var(--cyan);}
  .role{
    color:var(--ink-dim);
    font-size:0.92rem;
    margin:0 0 34px;
  }

  /* ---- flow diagram: Order-to-Cash ---- */
  .flow{
    background:var(--bg-panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:22px 16px 18px;
    margin-bottom:30px;
    position:relative;
    overflow:hidden;
  }
  .flow-label{
    font-family:'JetBrains Mono', monospace;
    font-size:0.65rem;
    letter-spacing:0.14em;
    color:var(--ink-dim);
    text-transform:uppercase;
    margin-bottom:16px;
  }
  .nodes{
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:relative;
  }
  .nodes::before{
    content:"";
    position:absolute;
    top:14px; left:14px; right:14px;
    height:2px;
    background:var(--line);
  }
  .track{
    position:absolute;
    top:14px; left:14px; right:14px;
    height:2px;
    overflow:hidden;
  }
  .packet{
    position:absolute;
    top:-2px;
    width:6px;height:6px;
    background:var(--cyan);
    border-radius:50%;
    box-shadow:0 0 10px var(--cyan);
    animation:travel 3.2s linear infinite;
  }
  @keyframes travel{
    0%{left:-2%;}
    100%{left:100%;}
  }
  .node{
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    width:25%;
  }
  .dot{
    width:14px;height:14px;
    border-radius:50%;
    background:var(--bg-panel);
    border:2px solid var(--amber);
  }
  .node-label{
    font-family:'JetBrains Mono', monospace;
    font-size:0.62rem;
    letter-spacing:0.04em;
    color:var(--ink-dim);
    text-align:center;
  }
  .node:nth-child(2) .dot, .node:nth-child(2) .node-label{}

  .tcode{
    margin-top:16px;
    font-family:'JetBrains Mono', monospace;
    font-size:0.68rem;
    color:var(--ink-dim);
    border-top:1px dashed var(--line);
    padding-top:12px;
    display:flex;
    justify-content:space-between;
  }
  .tcode b{color:var(--cyan); font-weight:500;}

  /* ---- buttons ---- */
  .actions{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  a.btn{
    font-family:'JetBrains Mono', monospace;
    font-size:0.85rem;
    text-decoration:none;
    padding:14px 18px;
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    transition:transform .15s ease, border-color .15s ease;
    border:1px solid var(--line);
  }
  a.btn:active{transform:scale(0.98);}
  .btn .arrow{opacity:0.6;}

  .primary{
    background:var(--amber);
    color:#14100a;
    border-color:var(--amber);
    font-weight:700;
  }
  .secondary{
    background:transparent;
    color:var(--ink);
  }
  .secondary:hover, .secondary:active{border-color:var(--cyan); color:var(--cyan);}

  footer{
    margin-top:26px;
    font-family:'JetBrains Mono', monospace;
    font-size:0.62rem;
    color:var(--ink-dim);
    text-align:center;
    letter-spacing:0.05em;
  }

  @media (prefers-reduced-motion: reduce){
    .packet, .eyebrow::before{animation:none;}
  }
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Sistema attivo</div>
    <h1>Edoardo Di Vona<br><span>SAP OTC Specialist</span></h1>
    <p class="role">SD/MM · Integrazioni REST &amp; IDoc · Supply Chain Data Flow</p>

    <div class="flow">
      <div class="flow-label">Processo Order-to-Cash</div>
      <div class="nodes">
        <div class="track"><div class="packet" style="animation-delay:0s;"></div></div>
        <div class="track"><div class="packet" style="animation-delay:1.6s;"></div></div>
        <div class="node"><div class="dot"></div><div class="node-label">ORDINE</div></div>
        <div class="node"><div class="dot"></div><div class="node-label">CONSEGNA</div></div>
        <div class="node"><div class="dot"></div><div class="node-label">FATTURA</div></div>
        <div class="node"><div class="dot"></div><div class="node-label">PAGAMENTO</div></div>
      </div>
      <div class="tcode">
        <span>DOC: <b>CV_EDV_2026</b></span>
        <span>STATUS: <b>READY</b></span>
      </div>
    </div>

    <div class="actions">
      <a class="btn primary" href="CV%20Edoardo%20Di%20Vona.pdf" target="_blank">
        <span>▸ Visualizza documento</span>
        <span class="arrow">→</span>
      </a>
      <a class="btn secondary" href="CV%20Edoardo%20Di%20Vona.pdf" download>
        <span>↓ Scarica PDF</span>
        <span class="arrow">→</span>
      </a>
    </div>

    <footer>ISOLA DEL LIRI (FR) · IT — ULTIMO AGGIORNAMENTO 2026</footer>
  </div>
</body>
</html>
